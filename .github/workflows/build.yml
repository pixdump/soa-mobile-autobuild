name: Build Expo Android and send link

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      APP_DIR: app
      JAVA_VERSION: "17"
      NODE_VERSION: "20"
      ANDROID_API_LEVEL: "34"
      ANDROID_BUILD_TOOLS: "34.0.0"
      SENTRY_DISABLE_AUTO_UPLOAD: "true"
      GRADLE_OPTS: >-
        -Dorg.gradle.jvmargs=-Xmx4g -Dkotlin.daemon.jvm.options=-Xmx2g

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Clone source app repo
        run: |
          git clone --depth 1 --branch development_old --single-branch \
          https://x-access-token:${{ secrets.SOURCE_REPO_TOKEN }}@github.com/${{ secrets.SOURCE_REPO }}.git "$APP_DIR"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Expo prebuild
        working-directory: ${{ env.APP_DIR }}
        run: npx expo prebuild --platform android

      - name: Build release APK
        working-directory: ${{ env.APP_DIR }}/android
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --configuration-cache \
            --configuration-cache-problems=warn \
            --parallel \
            --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find "$APP_DIR/android/app/build/outputs/apk/release" -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ steps.apk.outputs.path }}
