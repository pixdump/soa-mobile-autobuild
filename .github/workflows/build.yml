name: Build Expo Android and send link

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      APP_DIR: app
      JAVA_VERSION: "17"
      NODE_VERSION: "20"
      ANDROID_API_LEVEL: "34"
      ANDROID_BUILD_TOOLS: "34.0.0"
      SENTRY_DISABLE_AUTO_UPLOAD: "true"

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Clone source app repo
        run: |
          git clone --depth 1 --branch development --single-branch \
          https://x-access-token:${{ secrets.SOURCE_REPO_TOKEN }}@github.com/${{ secrets.SOURCE_REPO }}.git "$APP_DIR"

      # Node + npm cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      # Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # Gradle cache (BIG speed boost)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      # Install JS deps
      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      # Generate native project (no Expo servers)
      - name: Expo prebuild
        working-directory: ${{ env.APP_DIR }}
        run: npx expo prebuild --platform android

      # Build APK
      - name: Build release APK
        working-directory: ${{ env.APP_DIR }}/android
        run: ./gradlew assembleRelease --stacktrace

      # Find APK
      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find "$APP_DIR/android/app/build/outputs/apk/release" -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      # Upload artifact (backup)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ steps.apk.outputs.path }}

      # Upload to Gofile
      - name: Upload to Gofile
        id: gofile
        run: |
          RESPONSE=$(curl -sS -X POST "https://upload.gofile.io/uploadfile" \
            -F "file=@${{ steps.apk.outputs.path }}")

          echo "$RESPONSE" > gofile.json

          python - << 'PY'
          import json
          data = json.load(open("gofile.json"))

          url = None
          if isinstance(data, dict):
              d = data.get("data", {})
              url = d.get("downloadPage") or d.get("downloadUrl") or d.get("pageLink")

          if not url:
              raise SystemExit("No download URL found")

          with open("url.txt", "w") as f:
              f.write(url)
          PY

          echo "url=$(cat url.txt)" >> "$GITHUB_OUTPUT"

      # Send to Discord
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOFILE_URL: ${{ steps.gofile.outputs.url }}
          FILE_NAME: ${{ steps.apk.outputs.name }}
          BUILD_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - << 'PY'
          import json, os, urllib.request

          payload = {
              "content": f"Android build ready: {os.environ['FILE_NAME']}",
              "embeds": [
                  {
                      "title": "Build Complete",
                      "description": f"[Download APK]({os.environ['GOFILE_URL']})\n[Workflow]({os.environ['BUILD_URL']})"
                  }
              ]
          }

          req = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"}
          )

          urllib.request.urlopen(req)
          PY
